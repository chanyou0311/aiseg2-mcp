function isIE11()
{
	if (!!navigator.userAgent.match(/Trident.*rv[ :]*11./)) {
		return true;
	}

function getElementsByClass(searchClass) 
{
	var classElements = new Array();
	var allElements = document.getElementsByTagName("a");
	for (var i = 0; i < allElements.length; i++) {
		if (allElements[i].className == searchClass) {
			classElements.push(allElements[i]);
		}
	}
	return classElements;
}
function setFocus(str) 
{
	var ele = document.getElementById(str);
	if (!ele) return;
	ele.focus();
}
function hideFocusObjects(ary) 
{
	for (var i = 0; i < ary.length; i++) {
		ary[i].style.visibility = "hidden";
	}
}
function showFocusObjects(ary) 
{
	for (var i = 0; i < ary.length; i++) {
		ary[i].style.visibility = "visible";
	}
}

		if (fmode == 0) {
			hideFocusObjects(hhit);
			hideFocusObjects(htab);

			pos_y1 = 410;
			pos_y2 = 310;
			tmp_mode = 1;
			fmode = 2;
			document.getElementById('fmenu').style.visibility = "visible";
		}
		else if (fmode == 1) {
			pos_y1 = 310;
			pos_y2 = 410;
			tmp_mode = 0;
			fmode = 2;
		}

		var fpd = Math.round((pos_y2 - pos_y1) / flameStep);
		var tpos = [];
		for (i = 0; i < flameStep; i++) {
			if (i ==  flameStep - 1) {
				tpos[i] = pos_y2;
			} else {
				tpos[i] = fpd * (1 + i) + pos_y1;
			}
		}

		var cnt = 0;
		function moveLayer() 
		{
			fm.style.top   = tpos[cnt] + "px";
			if (cnt >= flameStep - 1) {
				cnt = 0;
				fmode = tmp_mode;
				if (tmp_mode == 0) {
					document.getElementById('fmenu').style.visibility = "hidden";
					if (dname != "tv") {
						document.getElementById('hitLayer').style.visibility = "hidden";
					}
					if (dname != "suma") {
						document.getElementById('hitLayer').style.visibility = "hidden";
					}
					showFocusObjects(hhit);
					showFocusObjects(htab);
				} else if (tmp_mode == 1) {
					if (dname != "tv") {
						document.getElementById('hitLayer').style.visibility = "visible";
					}
					if (dname != "suma") {
						document.getElementById('hitLayer').style.visibility = "visible";
					}
				}
				return;
			}
			else {
				cnt++;
				setTimeout(moveLayer, flameSpeed);
			}
		}
		moveLayer();
	}
}
