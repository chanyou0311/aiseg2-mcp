name: Release

# Tag-driven release: publishes the PyPI package, the multi-arch GHCR image, and the MCP registry
# entry. Triggered by pushing a semver tag (e.g. v0.1.0).
#
# Prerequisite (one-time, human): configure PyPI Trusted Publishing for this workflow/environment
# so publish-pypi needs no API token. Until that is set up, do not push a release tag.
on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE: ghcr.io/chanyou0311/aiseg2-mcp

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pytest -q

  publish-pypi:
    needs: test
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # Trusted Publishing (OIDC); no API token needed
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true  # hatch-vcs derives the version from the tag
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-ghcr:
    needs: test
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ghcr:
    needs: publish-ghcr
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)
      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}

  publish-mcp-registry:
    needs: [publish-pypi, merge-ghcr]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write  # GitHub OIDC login to the MCP registry
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version into server.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v | .packages |= map(.version = $v | if .registryType == "oci" then .identifier |= (split(":")[0] + ":" + $v) else . end)' server.json > server.json.tmp
          mv server.json.tmp server.json
      - name: Install mcp-publisher
        run: |
          # Asset names carry no version segment (verified against v1.8.0 release assets).
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP registry
        run: ./mcp-publisher publish
